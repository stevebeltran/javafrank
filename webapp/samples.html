<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dot style samples — pick one</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font: 14px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif; background: #101418; color: #dbe4ec; }
  h1 { font-size: 16px; padding: 12px 16px; }
  #row { display: flex; gap: 10px; padding: 0 10px 10px; height: calc(100vh - 60px); }
  .cell { flex: 1; display: flex; flex-direction: column; border: 1px solid #2c3742; border-radius: 8px; overflow: hidden; }
  .cell h2 { font-size: 13px; padding: 8px 10px; background: #181e24; }
  .cell h2 small { color: #8496a5; font-weight: 400; }
  .map { flex: 1; }
  @media (max-width: 1000px) { #row { flex-direction: column; height: auto; } .map { height: 340px; } }
</style>
</head>
<body>
<h1>Call-dot styles · #2dc8ff · same 76k demo calls — pick 1, 2, or 3</h1>
<div id="row">
  <div class="cell"><h2>1 · Python match <small>adaptive size/opacity ladder from app.py — translucent density cloud</small></h2><div class="map" id="m1"></div></div>
  <div class="cell"><h2>2 · Glow <small>soft blurred halo + brighter core — hotspots bloom</small></h2><div class="map" id="m2"></div></div>
  <div class="cell"><h2>3 · Crisp <small>constant small dots, zoom-scaled, no fade</small></h2><div class="map" id="m3"></div></div>
</div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
'use strict';
// same rAF fallback as the app so hidden tabs still render
(function () {
  const raf = window.requestAnimationFrame.bind(window), caf = window.cancelAnimationFrame.bind(window);
  window.requestAnimationFrame = cb => {
    let done = false;
    const id = raf(t => { done = true; cb(t); });
    setTimeout(() => { if (!done) { caf(id); cb(performance.now()); } }, 120);
    return id;
  };
})();

// same synthetic Naperville demo generator as main.js (60% of population)
function demoPoints() {
  const hotspots = [
    { lat: 41.772, lon: -88.150, w: 0.4, s: 0.012 },
    { lat: 41.750, lon: -88.117, w: 0.3, s: 0.015 },
    { lat: 41.789, lon: -88.204, w: 0.2, s: 0.010 },
  ];
  let seed = 42;
  const rand = () => { seed = (seed * 1103515245 + 12345) % 2147483648; return seed / 2147483648; };
  const gauss = () => (rand() + rand() + rand() + rand() - 2) / 2;
  const feats = [];
  for (let i = 0; i < 89724; i++) {
    const r = rand();
    let acc = 0, h = null;
    for (const hs of hotspots) { acc += hs.w; if (r < acc) { h = hs; break; } }
    const lat = h ? h.lat + gauss() * h.s : 41.72 + rand() * 0.09;
    const lon = h ? h.lon + gauss() * h.s * 1.3 : -88.22 + rand() * 0.13;
    feats.push({ type: 'Feature', geometry: { type: 'Point', coordinates: [lon, lat] }, properties: {} });
  }
  return { type: 'FeatureCollection', features: feats };
}
const FC = demoPoints();
const N = FC.features.length;
const CALL_COLOR = '#2dc8ff';

function pySize(n) { return n > 150000 ? 2 : n > 50000 ? 3 : n > 20000 ? 4 : 5; }
function pyOpacity(n) { return n > 150000 ? 0.06 : n > 50000 ? 0.10 : n > 20000 ? 0.18 : n > 10000 ? 0.28 : 0.4; }

const STYLES = {
  m1: { core: { radius: pySize(N) / 2 + 0.6, opacity: pyOpacity(N), blur: 0 }, halo: null },
  m2: {
    core: { radius: Math.max(1.2, pySize(N) / 2), opacity: Math.min(0.55, pyOpacity(N) * 3), blur: 0 },
    halo: { radius: pySize(N) * 1.8, opacity: Math.max(0.04, pyOpacity(N) / 2), blur: 1 },
  },
  m3: { core: { radius: ['interpolate', ['linear'], ['zoom'], 8, 1.3, 12, 2.4, 15, 4.5], opacity: 0.45, blur: 0 }, halo: null },
};

window.__maps = {};
for (const [id, s] of Object.entries(STYLES)) {
  const map = window.__maps[id] = new maplibregl.Map({
    container: id,
    style: {
      version: 8,
      sources: { carto: { type: 'raster', tiles: [
        'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
        'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
      ], tileSize: 256, attribution: '&copy; OSM &copy; CARTO' } },
      layers: [{ id: 'base', type: 'raster', source: 'carto' }],
    },
    center: [-88.155, 41.77], zoom: 11.3, attributionControl: false,
  });
  map.on('load', () => {
    map.addSource('calls', { type: 'geojson', data: FC });
    if (s.halo) {
      map.addLayer({ id: 'halo', type: 'circle', source: 'calls', paint: {
        'circle-radius': s.halo.radius, 'circle-color': CALL_COLOR,
        'circle-opacity': s.halo.opacity, 'circle-blur': s.halo.blur } });
    }
    map.addLayer({ id: 'pts', type: 'circle', source: 'calls', paint: {
      'circle-radius': s.core.radius, 'circle-color': CALL_COLOR,
      'circle-opacity': s.core.opacity, 'circle-blur': s.core.blur } });
  });
}
</script>
</body>
</html>
